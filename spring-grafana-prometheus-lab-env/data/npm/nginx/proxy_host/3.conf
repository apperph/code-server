# ------------------------------------------------------------
# vscode.apperlabs.com
# ------------------------------------------------------------



map $scheme $hsts_header {
    https   "max-age=63072000; preload";
}

server {
  set $forward_scheme http;
  set $server         "user1";
  set $port           8080;

  listen 80;
listen [::]:80;


  server_name vscode.apperlabs.com;
http2 off;











proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $http_connection;
proxy_http_version 1.1;


  access_log /data/logs/proxy-host-3_access.log proxy;
  error_log /data/logs/proxy-host-3_error.log warn;

# If a user types /grafana, automatically redirect them to 
# Grafana
location = /grafana {
    return 301 https://$host/grafana/;
}
location /grafana/ {
    proxy_pass http://grafana:3000;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Accept-Encoding gzip;
}


# --- Prometheus ---
# Redirects /prometheus to /prometheus/
location = /prometheus {
    return 301 https://$host/prometheus/;
}
# Proxies /prometheus/ to the Prometheus container
location /prometheus/ {
    # NO trailing slash on port 9090
    proxy_pass http://prometheus:9090;
    proxy_set_header Host $host;
}


# User 1
location = /user1 {
    return 301 https://$host/user1/;
}
location /user1/ {
    proxy_pass http://user1:8080/;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Accept-Encoding gzip;
}


# --- USER 3 ---
location = /user3 {
    return 301 https://$host/user3/;
}
location /user3/ {
    proxy_pass http://user3:8080/;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_set_header Accept-Encoding gzip;
}






  location / {






    
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;
    

    # Proxy!
    include conf.d/include/proxy.conf;
  }


  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}

